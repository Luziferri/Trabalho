<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Global</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dashboard-page ranking-page">
    <nav class="navbar">
        <div class="navbar-brand">Império de Recursos</div>
        <div class="navbar-user">
            <a class="botao" href="/dashboard">⬅ Voltar ao Jogo</a>
        </div>
    </nav>

    <main class="auth-container dashboard-wide dashboard-container game-surface ranking-container">
        <header class="auth-header ranking-header">
            <h1>Leaderboard Global</h1>
            <p>Os 10 melhores jogadores, ordenados pela pontuação total guardada na base de dados.</p>
        </header>

        <section class="dashboard-section ranking-section">
            <div class="ranking-table-wrapper">
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>Posição</th>
                            <th>Jogador</th>
                            <th>Pontuação</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        <tr>
                            <td colspan="3">A carregar o ranking...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/ranking.js') }}"></script>
</body>
</html>

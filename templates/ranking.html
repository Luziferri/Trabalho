<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Ranking Global</title>
</head>
<body>
    <a href="/dashboard">⬅ Voltar ao Jogo</a>
    
    <h1>Leaderboard Global</h1>
    
    <table border="1" style="width: 50%; text-align: left;">
        <thead>
            <tr>
                <th>Posição</th>
                <th>Jogador</th>
                <th>Pontuação</th>
            </tr>
        </thead>
        <tbody id="tabela-ranking">
            <tr>
                <td colspan="3">A carregar o ranking...</td>
            </tr>
        </tbody>
    </table>

    <script>
        async function carregarRanking() {
            try {
                const resposta = await fetch('/api/ranking');
                const jogadores = await resposta.json();
                const tabela = document.getElementById('tabela-ranking');
                tabela.innerHTML = ''; 
                
                jogadores.forEach((jogador, index) => {
                    let badge = '';
                    let estilo = '';
                    if (index === 0) { badge = '🥇 '; estilo = 'font-weight: bold;'; }
                    else if (index === 1) { badge = '🥈 '; estilo = 'font-weight: bold;'; }
                    else if (index === 2) { badge = '🥉 '; estilo = 'font-weight: bold;'; }
                    
                    tabela.innerHTML += `
                        <tr style="${estilo}">
                            <td>${index + 1}º</td>
                            <td>${badge}${jogador.username}</td>
                            <td>${jogador.score}</td>
                        </tr>
                    `;
                });
            } catch (erro) {
                console.error("Erro:", erro);
            }
        }
        carregarRanking();
        setInterval(carregarRanking, 5000);
    </script>
</body>
</html>
